<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Create New Account</h3>
        <form action="/create_account" method="POST">
            <input type="text" name="full_name" placeholder="Full Name" required>
            <input type="text" name="reg_no" placeholder="Registration Number" required>
            <input type="text" name="level" placeholder="Level (e.g. 200L)" required>
            <button type="submit">SIGN UP</button>
        </form>
        <br><a href="/" style="font-size: 0.8em; color: #666;">Already have an account? Login</a>
    </div>
</body>
</html>
