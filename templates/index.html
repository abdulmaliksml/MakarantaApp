<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADUSTECH Portal</title>
    <style>
        body { font-family: sans-serif; background: #004a99; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .admin-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #eee; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/admin.jpg" alt="Admin" class="admin-img">
        <h2>Student Portal</h2>
        <p style="font-size: 0.9em; color: #666;">Dept: Computer Science Education</p>
        
        <form action="/duba" method="POST">
            <input type="text" name="reg_number" placeholder="Enter Reg Number (e.g. UG24/...)" required>
            <button type="submit">LOGIN</button>
        </form>
        
        <p style="font-size: 0.8em; margin-top: 15px;">
            New student? <a href="/register_page" style="color: #004a99; font-weight: bold; text-decoration: none;">Create Account</a>
        </p>
        <div class="footer">Developed by Abdulmalik Muhammad Abbas</div>
    </div>
</body>
</html>
